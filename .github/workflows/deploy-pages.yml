# Builds the Vite app in web/ and deploys web/dist to GitHub Pages.
# Requires Settings -> Pages -> Source set to "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # (Re)provisions the Pages site if it doesn't exist — required after an
      # "Unpublish site", which deletes the site record entirely.
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      # Project pages are served at /<repo-name>/, so the asset base must match.
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
        working-directory: web
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
